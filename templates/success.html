<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to ELX Index Pro | EarthOne</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: #f8f9fa;
    color: #1d1d1f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border: 1px solid #e5e5e7;
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 480px;
    text-align: center;
  }
  .check {
    width: 64px;
    height: 64px;
    background: #34c759;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .check svg { width: 32px; height: 32px; fill: #fff; }
  h1 { font-size: 28px; font-weight: 600; margin-bottom: 12px; letter-spacing: -0.02em; }
  p { font-size: 16px; color: #6e6e73; line-height: 1.6; margin-bottom: 32px; }
  .btn {
    display: inline-block;
    background: #1d1d1f;
    color: #fff;
    padding: 14px 32px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn:hover { background: #333; }
</style>
</head>
<body>
<div class="card">
  <div class="check">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  </div>
  <h1>Welcome to ELX Index Pro</h1>
  <p>Your subscription is active. You now have full access to the Macro Decision Engine — Decision Engine, Hedge Strategy, Scenario Engine, Portfolio Analysis, and ELX Alerts.</p>
  <a href="/dashboard" class="btn">Open Dashboard</a>
</div>
</body>
</html>
